<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Vendedores | Palo Alto</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* ══════════════════════════════
       TOKENS VISUALES
    ══════════════════════════════ */
    :root {
      --naranja:       #E8470A;
      --naranja-2:     #FF5C1A;
      --naranja-dim:   rgba(232,71,10,.10);
      --naranja-dim2:  rgba(232,71,10,.18);
      --verde:         #16A34A;
      --verde-dim:     rgba(22,163,74,.10);
      --rojo:          #DC2626;
      --rojo-dim:      rgba(220,38,38,.10);
      --bg:            #F4F5F7;
      --bg-2:          #FFFFFF;
      --bg-3:          #F0F1F3;
      --bg-4:          #E4E5E8;
      --borde:         rgba(0,0,0,.08);
      --borde-2:       rgba(0,0,0,.14);
      --texto:         #111214;
      --texto-2:       #6B7280;
      --texto-3:       #9CA3AF;
      --sombra-lg:     0 4px 24px rgba(0,0,0,.08);
      --radio:         12px;
      --radio-lg:      16px;
    }

    [data-theme="dark"] {
      --bg:            #0E0F11;
      --bg-2:          #161719;
      --bg-3:          #1E2023;
      --bg-4:          #26292E;
      --borde:         rgba(255,255,255,.07);
      --borde-2:       rgba(255,255,255,.13);
      --texto:         #F0F0F0;
      --texto-2:       #9A9DA6;
      --texto-3:       #6B6F77;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Sora',sans-serif;background:var(--bg);color:var(--texto);font-size:14px;transition:background .22s,color .22s}
    body{display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;}

    body::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--naranja-dim2) 0%,transparent 70%);top:-180px;right:-120px;pointer-events:none}
    body::after{content:'';position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,var(--naranja-dim) 0%,transparent 70%);bottom:-120px;left:-80px;pointer-events:none}

    .app-card { background: var(--bg-2); border: 1px solid var(--borde-2); border-radius: var(--radio-lg); padding: 28px 20px; width: 100%; max-width: 420px; box-shadow: var(--sombra-lg); position: relative; z-index: 10; max-height: 92vh; overflow-y: auto; }

    .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
    .header-row h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px;}
    .header-row p { font-size: 11px; font-weight: 600; color: var(--texto-2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px;}

    .campo { margin-bottom: 20px; }
    .campo label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--texto-2); margin-bottom: 8px; letter-spacing: 0.05em; }
    .campo input, .campo select { width: 100%; background: var(--bg-3); border: 1px solid var(--borde-2); border-radius: var(--radio); padding: 14px 16px; color: var(--texto); font-size: 14px; outline: none; transition: all .2s; font-family: inherit;}
    .campo input:focus, .campo select:focus { border-color: var(--naranja); box-shadow: 0 0 0 3px var(--naranja-dim); background: var(--bg-2);}

    .btn { width: 100%; padding: 15px; border-radius: var(--radio); font-size: 13px; font-weight: 700; border: none; cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: var(--naranja); color: #fff; box-shadow: 0 4px 14px rgba(232,71,10,.25); }
    .btn-primary:hover:not(:disabled) { background: var(--naranja-2); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(232,71,10,.35);}
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { background: var(--bg-4); color: var(--texto-3); cursor: not-allowed; box-shadow: none; }
    .btn-secondary { background: var(--bg-3); color: var(--texto); margin-top: 12px; border: 1px solid var(--borde-2);}

    .menu-btn { background: var(--bg-2); border: 1px solid var(--borde-2); border-radius: var(--radio); padding: 20px 16px; width: 100%; text-align: left; margin-bottom: 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.02);}
    .menu-btn:hover { border-color: var(--naranja); background: var(--naranja-dim); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(232,71,10,0.08);}
    .menu-icon { width: 44px; height: 44px; background: var(--bg-3); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--naranja); flex-shrink: 0;}
    .menu-text h3 { font-size: 14px; font-weight: 700; color: var(--texto); margin-bottom: 4px; }
    .menu-text p { font-size: 11px; color: var(--texto-2); line-height: 1.4; }

    .vendedor-badge { background: var(--naranja-dim); border-left: 4px solid var(--naranja); padding: 16px; border-radius: 0 var(--radio) var(--radio) 0; margin-bottom: 24px; animation: fadeIn 0.3s ease; }
    .vendedor-badge h3 { font-size: 15px; color: var(--naranja); margin-bottom: 4px; }
    .vendedor-badge p { font-size: 12px; color: var(--texto-2); margin: 3px 0; }

    .upload-box { border: 2px dashed var(--borde-2); border-radius: var(--radio); padding: 30px 20px; text-align: center; background: var(--bg-3); cursor: pointer; position: relative; transition: all .2s; }
    .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    #img-preview-reg { width: 100%; max-height: 220px; border-radius: var(--radio); object-fit: contain; margin-top: 15px; display: none; background: #000; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--naranja); border-radius: 50%; animation: spin .8s linear infinite; }
    .overlay p { color: #fff; margin-top: 16px; font-weight: 600; font-size: 13px; letter-spacing: 0.05em; }

    .msg-error { background: var(--rojo-dim); color: var(--rojo); padding: 14px; border-radius: var(--radio); font-size: 12px; margin-top: 16px; display: none; border: 1px solid rgba(220,38,38,0.2); text-align: center; font-weight: 500; }

    .header-back { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--borde); }
    .btn-back { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-3); border: 1px solid var(--borde-2); color: var(--texto); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }

    #success-view { display: none; text-align: center; animation: fadeIn 0.4s ease; }
    .check-circle { width: 64px; height: 64px; background: var(--verde-dim); color: var(--verde); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .res-card { background: var(--bg-3); padding: 16px; border-radius: var(--radio); text-align: left; font-family: 'JetBrains Mono', monospace; font-size: 12px; margin: 24px 0; border: 1px solid var(--borde-2); }

    .sim-list { margin-top: 16px; max-height: 200px; overflow-y: auto; padding-right: 4px; }
    .sim-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-3); padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--borde-2); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; animation: fadeIn 0.2s ease;}
    .btn-remove-sim { background: var(--rojo-dim); color: var(--rojo); border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;}

    /* ══════════════════════════════
       INTERFAZ DEL ESCÁNER EN VIVO (MODAL)
    ══════════════════════════════ */
    #scanner-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
    #reader-live { flex: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #000;}
    #reader-live video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
    .scanner-overlay-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 150px; border: 2px solid #00FF00; border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); pointer-events: none; z-index: 2; }
    .scanner-overlay-frame::after { content: 'Enfoca el código de barras aquí'; position: absolute; bottom: -30px; left: 0; right: 0; text-align: center; color: #fff; font-size: 12px; font-weight: 600; }
    .scanner-controls { height: 90px; background: rgba(20, 20, 20, 0.95); display: flex; align-items: center; justify-content: space-around; padding: 0 20px; z-index: 3; border-top: 1px solid rgba(255,255,255,0.1);}
    .btn-cam-control { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .btn-cam-control:hover { background: rgba(255,255,255,0.2); }
    .btn-cam-control.active { background: #E8470A; color: #fff; }
    .btn-cam-control.close { background: var(--rojo); }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="overlay" id="global-loader">
    <div class="spinner"></div>
    <p id="loader-text">Procesando...</p>
  </div>

  <div id="scanner-modal">
    <div id="reader-live">
      <div class="scanner-overlay-frame" id="scanner-frame"></div>
    </div>
    <div class="scanner-controls">
      <button class="btn-cam-control" id="btn-flash" onclick="toggleFlash()" title="Linterna">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
      </button>
      <button class="btn-cam-control" id="btn-switch-cam" onclick="switchCamera()" title="Cambiar Cámara">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.44l5.36 5.36"></path></svg>
      </button>
      <button class="btn-cam-control close" onclick="cerrarScannerVivo()" title="Cerrar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <div class="app-card">
    
    <div id="menu-view">
      <div class="header-row">
        <div>
          <h1>Palo Alto App</h1>
          <p>Seleccione Operación</p>
        </div>
        <button class="icon-btn" style="width: 40px; height: 40px; background: var(--bg-3); border: 1px solid var(--borde-2); border-radius: 10px; color: var(--texto-2); cursor: pointer; display: flex; align-items: center; justify-content: center;" onclick="toggleTheme()">
          <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>

      <button class="menu-btn" onclick="abrirFlujo('regular')">
        <div class="menu-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
        </div>
        <div class="menu-text">
          <h3>Activación Regular</h3>
          <p>Registro individual con foto y validación estricta de Claro.</p>
        </div>
      </button>

      <button class="menu-btn" onclick="abrirFlujo('rutas')">
        <div class="menu-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </div>
        <div class="menu-text">
          <h3>Venta de Rutas</h3>
          <p>Registro masivo con escáner de cámara en vivo.</p>
        </div>
      </button>
    </div>

    <div id="regular-view" style="display: none;">
      <div class="header-back">
        <button class="btn-back" onclick="volverMenu()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <div><h2 style="font-size: 16px;">Activación Regular</h2></div>
      </div>

      <div id="reg-step-1">
        <div class="campo"><label>Código Maestro</label><input type="text" id="cod-maestro" placeholder="Ej: 31892438" inputmode="numeric"></div>
        <button class="btn btn-primary" onclick="buscarVendedor()">Verificar Código</button>
      </div>

      <div id="reg-step-2" style="display: none;">
        <div class="vendedor-badge"><h3 id="v-nombre">---</h3><p><strong>Canal:</strong> <span id="v-canal">---</span></p><p><strong>Zona:</strong> <span id="v-zona">---</span></p></div>
        <div class="campo">
          <label>Captura de Pantalla</label>
          <div class="upload-box">
            <input type="file" id="file-input-reg" accept="image/*" onchange="handleFileRegular(event)">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--texto-3); margin-bottom: 8px;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <p style="font-size: 13px; font-weight: 600; color: var(--texto-2);">Subir Captura</p>
          </div>
          <img id="img-preview-reg" src="">
        </div>
        <button class="btn btn-primary" id="btn-save-reg" onclick="guardarRegular()" disabled>Registrar Activación</button>
        <button class="btn btn-secondary" onclick="cancelarRegular()">Cancelar</button>
      </div>
      <div class="msg-error" id="error-box-reg"></div>
    </div>

    <div id="success-view" style="display: none;">
      <div class="check-circle"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
      <h2 style="font-size: 18px; font-weight: 700;">¡Registro Guardado!</h2>
      <div class="res-card">
        <div style="margin-bottom: 8px;"><strong>SIM:</strong> <span id="out-sim"></span></div>
        <div><strong>TEL:</strong> <span id="out-tel"></span></div>
      </div>
      <button class="btn btn-primary" onclick="nuevaVentaRegular()">Nueva Activación</button>
      <button class="btn btn-secondary" onclick="volverMenu()">Menú Principal</button>
    </div>

    <div id="rutas-view" style="display: none;">
      <div class="header-back">
        <button class="btn-back" onclick="volverMenu()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
        <div><h2 style="font-size: 16px;">Escáner de Rutas</h2></div>
      </div>

      <div id="rutas-form">
        <div style="display: flex; gap: 10px;">
          <div class="campo" style="flex: 1;">
            <label>Zona</label>
            <select id="ruta-zona" onchange="actualizarRutas()">
              <option value="">Seleccione...</option>
              <option value="El Paraiso">El Paraíso</option>
              <option value="Olancho">Olancho</option>
            </select>
          </div>
          <div class="campo" style="flex: 1;">
            <label>Ruta</label>
            <select id="ruta-numero" disabled>
              <option value="">Seleccione...</option>
            </select>
          </div>
        </div>

        <div class="campo">
          <label>Nombre del Negocio</label>
          <input type="text" id="ruta-negocio" placeholder="Ej: Pulpería La Bendición">
        </div>

        <div class="campo">
          <label>Número POS (Máx 8 dígitos)</label>
          <input type="text" id="ruta-pos" placeholder="Ingrese el POS" inputmode="numeric">
        </div>

        <hr style="border: none; border-top: 1px solid var(--borde-2); margin: 24px 0;">

        <div class="campo">
          <label style="display: flex; justify-content: space-between; align-items: center;">
            Escáner de Códigos
            <span id="contador-badge" style="background: var(--naranja); color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px;">0 SIMs</span>
          </label>
          
          <button class="btn btn-secondary" style="border: 1px solid var(--naranja); color: var(--naranja);" onclick="abrirScannerVivo()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M4 7V4h3"></path><path d="M4 17v3h3"></path><path d="M20 7V4h-3"></path><path d="M20 17v3h-3"></path><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            Abrir Cámara en Vivo
          </button>

          <div class="sim-list" id="lista-sims"></div>
        </div>

        <button class="btn btn-primary" id="btn-save-rutas" disabled onclick="enviarListaMasiva()">Guardar <span id="btn-count"></span> SIMs</button>
      </div>

      <div class="msg-error" id="error-box-rutas"></div>
    </div>

    <div id="resumen-rutas-view" style="display: none;">
      <h2 style="font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 24px;">Resumen de Operación</h2>
      <div class="status-badge status-success" id="bloque-exito" style="padding: 12px; border-radius: var(--radio); font-weight: 600; text-align: center; margin-bottom: 16px; background: var(--verde-dim); color: var(--verde); border: 1px solid rgba(22,163,74,0.2);">
        ✅ <span id="resumen-exitosas">0 guardadas con éxito</span>
      </div>
      <div id="bloque-fallidas" style="display: none; padding: 12px; border-radius: var(--radio); margin-bottom: 16px; background: var(--rojo-dim); border: 1px solid rgba(220,38,38,0.2);">
        <div style="font-weight: 600; color: var(--rojo); text-align: center; margin-bottom: 8px;">⚠️ <span id="resumen-errores">0 rechazadas</span></div>
        <div id="lista-fallidas" style="max-height: 200px; overflow-y: auto;"></div>
      </div>
      <button class="btn btn-primary" onclick="nuevaRutaMasiva()" style="margin-top: 24px;">Siguiente Pulpería</button>
      <button class="btn btn-secondary" onclick="volverMenu()">Volver al Menú</button>
    </div>

  </div>

<script>
  // ==========================================
  // CONFIGURACIÓN DE LA API (TU URL OFICIAL)
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbwgFYzjUanpl8sork-M99ApSUKtb7MiMgOXHOg1SICRQzhIegz7WrTaLcmUJQa69e6D/exec";

  let sessionData = {};
  let currentBase64Regular = "";
  let simsEscaneados = [];
  let ultimoSimEscaneado = "";

  // Variables para la Cámara en Vivo
  let html5QrcodeScannerLive;
  let currentFacingMode = "environment";
  let isFlashOn = false;

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    const icon = document.getElementById('theme-icon');
    if (isDark) {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    } else {
      icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    }
  }

  function setLoader(active, text = "Procesando...") {
    document.getElementById('global-loader').style.display = active ? 'flex' : 'none';
    document.getElementById('loader-text').innerText = text;
  }

  function playBeep() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.type = 'sine';
      oscillator.frequency.value = 900;
      gainNode.gain.value = 0.1;
      oscillator.start();
      setTimeout(() => oscillator.stop(), 100);
      if (navigator.vibrate) navigator.vibrate(150);
    } catch(e) {}
  }

  function comprimirImagen(file, maxWidth, callback) {
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(img.src); 
      const canvas = document.createElement('canvas');
      let width = img.width;
      let height = img.height;
      if (width > height) {
        if (width > maxWidth) { height = Math.round(height * (maxWidth / width)); width = maxWidth; }
      } else {
        if (height > maxWidth) { width = Math.round(width * (maxWidth / height)); height = maxWidth; }
      }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, width, height);
      ctx.drawImage(img, 0, 0, width, height);
      const base64 = canvas.toDataURL('image/jpeg', 0.85);
      callback(base64); 
    };
  }

  function abrirFlujo(flujo) {
    document.getElementById('menu-view').style.display = 'none';
    if(flujo === 'regular') {
      document.getElementById('regular-view').style.display = 'block';
    } else {
      document.getElementById('rutas-view').style.display = 'block';
    }
  }

  function volverMenu() {
    document.getElementById('regular-view').style.display = 'none';
    document.getElementById('rutas-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('resumen-rutas-view').style.display = 'none';
    document.getElementById('menu-view').style.display = 'block';
  }

  // ==========================================
  // COMUNICACIÓN CON LA API DE GOOGLE (BLINDADA)
  // ==========================================
  async function llamarAPI(accion, payload) {
    try {
      const response = await fetch(API_URL, {
        method: "POST",
        // Esto evita que el navegador bloquee la petición por seguridad (CORS)
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({ accion: accion, payload: payload })
      });
      
      // Leemos la respuesta de Google como texto primero
      const textoRespuesta = await response.text(); 
      
      try {
        // Intentamos convertirla a datos
        return JSON.parse(textoRespuesta);
      } catch (e) {
        // Si falla, significa que Google nos mandó una página web (HTML)
        console.error("Google respondió esto en lugar de datos:", textoRespuesta);
        alert("Bloqueo de Google: Tu cuenta de correo corporativo está pidiendo iniciar sesión o el código en Apps Script no se actualizó correctamente.");
        return { exito: false, mensaje: "Error de formato en la respuesta." };
      }
    } catch (err) {
      alert("Falla de red: No se pudo alcanzar el servidor de Google.");
      return { exito: false, mensaje: err.message };
    }
  }

  function handleFileRegular(e) {
    const file = e.target.files[0];
    if(!file) return;
    setLoader(true, "Optimizando imagen...");
    comprimirImagen(file, 1200, function(base64) {
      document.getElementById('img-preview-reg').src = base64;
      document.getElementById('img-preview-reg').style.display = 'block';
      currentBase64Regular = base64.split(',')[1];
      document.getElementById('btn-save-reg').disabled = false;
      setLoader(false);
    });
  }

  async function guardarRegular() {
    setLoader(true, "Procesando captura...");
    const payload = { 
      codigoMaestro: document.getElementById('cod-maestro').value.trim(), 
      vendedor: sessionData.vendedor, 
      zona: sessionData.zona, 
      canal: sessionData.canal, 
      imagenBase64: currentBase64Regular 
    };
    
    try {
      const res = await llamarAPI("procesarActivacion", payload);
      setLoader(false);
      if(res.exito) {
        document.getElementById('regular-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
        document.getElementById('out-sim').innerText = res.sim;
        document.getElementById('out-tel').innerText = res.telefono;
      } else {
        document.getElementById('error-box-reg').innerText = res.mensaje;
        document.getElementById('error-box-reg').style.display = 'block';
      }
    } catch(err) {
      setLoader(false);
      alert("Error conectando al servidor.");
    }
  }

  function cancelarRegular() {
    document.getElementById('reg-step-2').style.display = 'none';
    document.getElementById('reg-step-1').style.display = 'block';
    document.getElementById('cod-maestro').value = "";
    document.getElementById('img-preview-reg').style.display = 'none';
    document.getElementById('btn-save-reg').disabled = true;
    currentBase64Regular = ""; sessionData = {};
  }

  function nuevaVentaRegular() {
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('regular-view').style.display = 'block';
    document.getElementById('img-preview-reg').style.display = 'none';
    document.getElementById('btn-save-reg').disabled = true;
    currentBase64Regular = "";
  }

  // --- LÓGICA RUTAS ---
  function actualizarRutas() {
    const zona = document.getElementById('ruta-zona').value;
    const comboRutas = document.getElementById('ruta-numero');
    comboRutas.innerHTML = '<option value="">Seleccione...</option>';
    if(!zona) { comboRutas.disabled = true; return; }
    comboRutas.disabled = false;
    let inicio = zona === 'El Paraiso' ? 201 : 301;
    let fin = zona === 'El Paraiso' ? 213 : 317;
    for(let i = inicio; i <= fin; i++) { comboRutas.innerHTML += `<option value="Ruta ${i}">Ruta ${i}</option>`; }
  }

  // Formateador POS: Máximo 8 dígitos, sin guion, sin letras
  document.getElementById('ruta-pos').addEventListener('input', function (e) {
    let valor = e.target.value.replace(/\D/g, '');
    if (valor.length > 8) { valor = valor.slice(0, 8); }
    e.target.value = valor;
  });

  // Formateador Negocio: Letras Capitales
  document.getElementById('ruta-negocio').addEventListener('input', function (e) {
    let start = e.target.selectionStart;
    let end = e.target.selectionEnd;
    let valorFormateado = e.target.value.toLowerCase().replace(/(?:^|\s)\S/g, function(letra) {
      return letra.toUpperCase();
    });
    e.target.value = valorFormateado;
    e.target.setSelectionRange(start, end);
  });

  // ==========================================
  // ESCÁNER EN VIVO (MODAL)
  // ==========================================
  function abrirScannerVivo() {
    document.getElementById('scanner-modal').style.display = 'flex';
    
    if (!html5QrcodeScannerLive) {
      html5QrcodeScannerLive = new Html5Qrcode("reader-live");
    }

    const config = { 
      fps: 15, 
      qrbox: { width: 250, height: 100 }, 
      formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ],
      aspectRatio: window.innerHeight / window.innerWidth
    };

    html5QrcodeScannerLive.start(
      { facingMode: currentFacingMode }, 
      config, 
      (decodedText) => {
        if (/^89\d{15,19}$/.test(decodedText)) {
          if (decodedText !== ultimoSimEscaneado) {
            ultimoSimEscaneado = decodedText;
            if (!simsEscaneados.includes(decodedText)) {
              playBeep();
              simsEscaneados.push(decodedText);
              actualizarListaSims();
              
              // Animación visual verde
              const frame = document.getElementById('scanner-frame');
              frame.style.borderColor = "#FFF";
              frame.style.backgroundColor = "rgba(255,255,255,0.3)";
              setTimeout(() => {
                frame.style.borderColor = "#00FF00";
                frame.style.backgroundColor = "transparent";
                ultimoSimEscaneado = "";
              }, 800);
            } else {
              // Animación visual roja (Duplicado)
              const frame = document.getElementById('scanner-frame');
              frame.style.borderColor = "red";
              setTimeout(() => { frame.style.borderColor = "#00FF00"; }, 500);
            }
          }
        }
      }
    ).catch(err => {
      alert("Permiso Denegado: Asegúrate de darle a 'Permitir' para encender la cámara.");
      cerrarScannerVivo();
    });
  }

  function cerrarScannerVivo() {
    if (html5QrcodeScannerLive && html5QrcodeScannerLive.isScanning) {
      html5QrcodeScannerLive.stop().then(() => {
        document.getElementById('scanner-modal').style.display = 'none';
        isFlashOn = false;
        document.getElementById('btn-flash').classList.remove('active');
      }).catch(e => console.log(e));
    } else {
      document.getElementById('scanner-modal').style.display = 'none';
    }
  }

  function switchCamera() {
    if (html5QrcodeScannerLive && html5QrcodeScannerLive.isScanning) {
      html5QrcodeScannerLive.stop().then(() => {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        isFlashOn = false;
        document.getElementById('btn-flash').classList.remove('active');
        abrirScannerVivo();
      });
    }
  }

  function toggleFlash() {
    if (html5QrcodeScannerLive && html5QrcodeScannerLive.isScanning) {
      isFlashOn = !isFlashOn;
      html5QrcodeScannerLive.applyVideoConstraints({
        advanced: [{ torch: isFlashOn }]
      }).then(() => {
        const btn = document.getElementById('btn-flash');
        if(isFlashOn) btn.classList.add('active');
        else btn.classList.remove('active');
      }).catch(err => {
        alert("La linterna web no es compatible con el navegador de tu celular.");
        isFlashOn = false;
        document.getElementById('btn-flash').classList.remove('active');
      });
    }
  }

  function actualizarListaSims() {
    const lista = document.getElementById('lista-sims');
    lista.innerHTML = '';
    document.getElementById('contador-badge').innerText = `${simsEscaneados.length} SIMs`;
    
    if (simsEscaneados.length > 0) {
      document.getElementById('btn-save-rutas').disabled = false;
      document.getElementById('btn-count').innerText = `(${simsEscaneados.length})`;
    } else {
      document.getElementById('btn-save-rutas').disabled = true;
      document.getElementById('btn-count').innerText = '';
    }

    [...simsEscaneados].reverse().forEach((sim, idx) => {
      const realIndex = simsEscaneados.length - 1 - idx; 
      lista.innerHTML += `
        <div class="sim-item">
          <span>💳 ${sim}</span>
          <button class="btn-remove-sim" onclick="borrarSim(${realIndex})">✕</button>
        </div>
      `;
    });
  }

  function borrarSim(index) {
    simsEscaneados.splice(index, 1);
    actualizarListaSims();
  }

  async function enviarListaMasiva() {
    if(!document.getElementById('ruta-zona').value || !document.getElementById('ruta-numero').value || !document.getElementById('ruta-negocio').value || !document.getElementById('ruta-pos').value) {
      const err = document.getElementById('error-box-rutas');
      err.innerText = "Complete Zona, Ruta, Negocio y POS antes de procesar.";
      err.style.display = 'block';
      return;
    }
    document.getElementById('error-box-rutas').style.display = 'none';
    setLoader(true, `Enviando ${simsEscaneados.length} SIMs al servidor...`);

    const payload = {
      zona: document.getElementById('ruta-zona').value,
      ruta: document.getElementById('ruta-numero').value,
      negocio: document.getElementById('ruta-negocio').value.trim(),
      pos: document.getElementById('ruta-pos').value.trim(),
      sims: simsEscaneados
    };

    try {
      const res = await llamarAPI("procesarRutasScanner", payload);
      setLoader(false);
      
      if (res.exito) {
        document.getElementById('rutas-view').style.display = 'none';
        document.getElementById('resumen-rutas-view').style.display = 'block';
        document.getElementById('resumen-exitosas').innerText = `${res.exitosas} guardadas con éxito`;

        const bloqueFallidas = document.getElementById('bloque-fallidas');
        const listaFallidas = document.getElementById('lista-fallidas');
        listaFallidas.innerHTML = '';

        if (res.fallidas.length > 0) {
          document.getElementById('resumen-errores').innerText = `${res.fallidas.length} rechazadas`;
          bloqueFallidas.style.display = 'block';
          res.fallidas.forEach(falla => {
            listaFallidas.innerHTML += `<div style="color:var(--rojo); font-family:'JetBrains Mono'; font-size:11px; margin-bottom:4px;">💳 ${falla.sim} - ${falla.error}</div>`;
          });
        } else {
          bloqueFallidas.style.display = 'none';
        }
      } else {
        document.getElementById('error-box-rutas').innerText = res.mensaje;
        document.getElementById('error-box-rutas').style.display = 'block';
      }
    } catch(err) {
      setLoader(false);
      alert("Error conectando al servidor.");
    }
  }

  function nuevaRutaMasiva() {
    document.getElementById('ruta-negocio').value = "";
    document.getElementById('ruta-pos').value = "";
    simsEscaneados = [];
    actualizarListaSims();
    document.getElementById('resumen-rutas-view').style.display = 'none';
    document.getElementById('rutas-view').style.display = 'block';
  }
</script>
